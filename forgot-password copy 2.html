<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - OMS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
        }

        .card h2 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
        }

        .card p {
            text-align: center;
            color: #333333;
            font-size: 15px;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cccccc;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5c5cff;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            background: #5c5cff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4b4bdf;
        }

        button:disabled {
            background: #a5a5ff;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #5c5cff;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>ลืมรหัสผ่าน</h2>
    <p>กรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>

    <div class="form-group">
        <label for="forgotEmail">อีเมล</label>
        <input type="email" id="forgotEmail" placeholder="admin@domain.com" required>
    </div>

    <button onclick="requestPasswordReset()">ส่งลิงก์กู้คืนรหัสผ่าน</button>

    <div class="back-link">
        <a href="index.html">กลับไปหน้าล็อกอิน</a>
    </div>
</div>

<script>
    window.requestPasswordReset = async function() {
      const emailInput = document.getElementById('forgotEmail');
      const email = emailInput.value.trim();
      const client = window.supabaseClient;

      if (!email) {
          alert('กรุณากรอกอีเมล');
          return;
      }

      const btn = document.querySelector('button');
      btn.innerText = "กำลังตรวจสอบ...";
      btn.disabled = true;

      try {
          // 1. ตรวจสอบอีเมลในตาราง admin_users
          const { data: userRecord, error: dbError } = await client
              .from('admin_users')
              .select('email')
              .eq('email', email)
              .single();

          // 2. ถ้าไม่พบอีเมลในระบบแอดมิน
          if (dbError || !userRecord) {
              alert('ไม่พบอีเมลนี้ในระบบแอดมิน');
              btn.innerText = "ส่งลิงก์กู้คืนรหัสผ่าน";
              btn.disabled = false;
              return;
          }

          // 3. ส่งลิงก์กู้คืนรหัสผ่านไปยังอีเมลที่ระบุ
          const { error: resetError } = await client.auth.resetPasswordForEmail(email, {
              redirectTo: 'https://saichonsomkidsamer.github.io/Supabase-Forgotpassword-Test/update-password.html',
          });

          if (resetError) {
              alert('เกิดข้อผิดพลาดในการส่งอีเมล: ' + resetError.message);
          } else {
              // แสดงป็อปอัปแจ้งเตือนสำเร็จก่อน
              alert('ส่งลิงก์สำเร็จ! โปรดตรวจสอบอีเมลของคุณ');

              // บรรทัดเหล่านี้จะทำงานทันทีหลังจากผู้ใช้กดปุ่ม OK บน alert
              emailInput.value = ''; // เคลียร์ช่องกรอกอีเมลให้ว่างเปล่า
              window.location.href = 'index.html'; // เปลี่ยนหน้ากลับไปหน้า Login ทันที
          }
      } catch (err) {
          alert('ระบบขัดข้อง: ' + err.message);
      } finally {
          btn.innerText = "ส่งลิงก์กู้คืนรหัสผ่าน";
          btn.disabled = false;
      }
  };
</script>
</body>
</html>
