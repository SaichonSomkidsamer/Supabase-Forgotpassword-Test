<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่าน - OMS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
        }

        .card h2 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
        }

        .card p {
            text-align: center;
            color: #333333;
            font-size: 15px;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cccccc;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5c5cff;
        }

        /* ส่วนที่เพิ่ม: สไตล์สำหรับจัดการตำแหน่งปุ่มแสดง/ซ่อนรหัสผ่าน */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 50px;
        }

        .toggle-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666666;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            background: #5c5cff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button.btn-submit:hover {
            background: #4b4bdf;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>ตั้งรหัสผ่านใหม่</h2>
    <p>กรุณากำหนดรหัสผ่านใหม่สำหรับเข้าสู่ระบบ</p>

    <div class="form-group">
        <label for="newPassword">รหัสผ่านใหม่</label>
        <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)">
            <button type="button" id="togglePassword" class="toggle-btn" title="แสดง/ซ่อนรหัสผ่าน">👁️</button>
        </div>
    </div>

    <button onclick="updatePassword()" class="btn-submit">บันทึกรหัสผ่าน</button>
</div>

<script>
    // ส่วนที่เพิ่ม: ระบบควบคุมการ แสดง / ซ่อน รหัสผ่านด้วยดวงตาเหมือนหน้า index.html
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('newPassword');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '🙈';
    });

    async function updatePassword() {
        const newPassword = document.getElementById('newPassword').value;

        if (newPassword.length < 6) {
            alert("รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร");
            return;
        }

        // 1. เปลี่ยนรหัสผ่านใน Auth ของ Supabase
        const { data: authData, error: authError } = await window.supabaseClient.auth.updateUser({
            password: newPassword
        });

        if (authError) {
            alert("เกิดข้อผิดพลาดในการเปลี่ยนรหัสผ่าน: " + authError.message);
            return;
        }

        // 2. ถ้าเปลี่ยนรหัสสำเร็จ ให้บันทึกลงตาราง admin_users ว่าเปลี่ยนแล้ว
        const user = authData.user;
        const { error: dbError } = await window.supabaseClient
            .from('admin_users')
            .update({ is_password_changed: true })
            .eq('id', user.id);

        if (dbError) {
            alert("เปลี่ยนรหัสผ่านสำเร็จ แต่เกิดข้อผิดพลาดในการอัปเดตสถานะ: " + dbError.message);
        } else {
            alert("เปลี่ยนรหัสผ่านและอัปเดตสถานะสำเร็จ!");
            window.location.href = 'orders.html'; // ส่งกลับไปหน้างานหลัก
        }
    }
</script>
</body>
</html>
