<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่าน - OMS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- แก้ไขเป็น Absolute Path เพื่อให้ GitHub Pages เรียกใช้งานไฟล์ config ได้ถูกต้อง ไม่ว่าจะโดน Redirect มาจากลิงก์ไหน -->
    <script src="/Supabase-Forgotpassword-Test/js/config.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            display: block;
        }

        .card h2 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
        }

        .card p {
            text-align: center;
            color: #333333;
            font-size: 15px;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cccccc;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5c5cff;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 50px;
        }

        .toggle-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666666;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            background: #5c5cff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button.btn-submit:hover {
            background: #4b4bdf;
        }

        button.btn-submit:disabled {
            background: #aaaaaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="card" id="formCard">
    <h2>ตั้งรหัสผ่านใหม่</h2>
    <p>กรุณากำหนดรหัสผ่านใหม่สำหรับเข้าสู่ระบบ</p>

    <div class="form-group">
        <label for="newPassword">รหัสผ่านใหม่</label>
        <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)">
            <button type="button" id="togglePassword" class="toggle-btn" title="แสดง/ซ่อนรหัสผ่าน">👁️</button>
        </div>
    </div>

    <button onclick="updatePassword()" id="btnSubmit" class="btn-submit">บันทึกรหัสผ่าน</button>
</div>

<script>
    // ดักจับการโหลดหน้าเว็บเพื่อประมวลผลเซสชันจาก URL Hash ของ Supabase
    window.addEventListener('DOMContentLoaded', async () => {
        // ตรวจสอบความพร้อมของข้อมูลเชื่อมต่อจาก config.js ก่อนทำงาน
        if (!window.supabaseClient) {
            alert("ไม่สามารถเชื่อมต่อกับฐานข้อมูลระบบได้ กรุณาตรวจสอบการตั้งค่าใน config.js");
            return;
        }

        try {
            // ดึง Session ปัจจุบัน (Supabase SDK จะแกะ Token จาก # บน URL ให้อัตโนมัติในคำสั่งนี้)
            const { data: { session }, error: sessionError } = await window.supabaseClient.auth.getSession();

            if (sessionError || !session) {
                alert("ลิงก์คำเชิญไม่ถูกต้อง หมดอายุ หรือไม่มีสิทธิ์เข้าถึงหน้านี้ ระบบจะพาคุณไปที่หน้า Login");
                window.location.href = 'index.html'; // หากไม่มี Session ให้ดีดกลับหน้าแรกทันที
                return;
            }

            console.log("ยืนยันตัวตนจากลิงก์เชิญสำเร็จสำหรับแอดมินใหม่:", session.user.email);
        } catch (err) {
            console.error("เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์:", err);
            window.location.href = 'index.html';
        }
    });

    // ระบบควบคุมการ แสดง / ซ่อน รหัสผ่านด้วยดวงตา
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('newPassword');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // ฟังก์ชันสำหรับส่งข้อมูลเปลี่ยนรหัสผ่าน
    async function updatePassword() {
        const newPassword = document.getElementById('newPassword').value;
        const btnSubmit = document.getElementById('btnSubmit');

        if (!newPassword || newPassword.length < 6) {
            alert("รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร");
            return;
        }

        // เปิดสถานะ Loading เพื่อป้องกันการกดเบิ้ลซ้ำ
        btnSubmit.disabled = true;
        btnSubmit.textContent = "กำลังบันทึกข้อมูล...";

        try {
            // 1. เปลี่ยนรหัสผ่านใน Auth ของ Supabase
            const { data: authData, error: authError } = await window.supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (authError) {
                alert("เกิดข้อผิดพลาดในการเปลี่ยนรหัสผ่าน: " + authError.message);
                btnSubmit.disabled = false;
                btnSubmit.textContent = "บันทึกรหัสผ่าน";
                return;
            }

            // 2. ถ้าเปลี่ยนรหัสสำเร็จ ให้บันทึกลงตาราง admin_users ว่าเปลี่ยนแล้ว
            const user = authData.user;
            const { error: dbError } = await window.supabaseClient
                .from('admin_users')
                .update({ is_password_changed: true })
                .eq('id', user.id);

            if (dbError) {
                alert("เปลี่ยนรหัสผ่านสำเร็จ แต่เกิดข้อผิดพลาดในการอัปเดตสถานะในฐานข้อมูล: " + dbError.message);
                // ปลดล็อกปุ่มให้เผื่อต้องรันซ้ำหรือตรวจสอบเรื่อง RLS
                btnSubmit.disabled = false;
                btnSubmit.textContent = "บันทึกรหัสผ่าน";
            } else {
                alert("ตั้งรหัสผ่านใหม่และเปิดใช้งานบัญชีสำเร็จเรียบร้อยแล้ว!");

                // 3. สั่ง Sign Out เซสชันชั่วคราวออกไปก่อน เพื่อบังคับให้เข้าสู่ระบบใหม่อย่างถูกต้อง
                await window.supabaseClient.auth.signOut();

                // 4. ดีดกลับไปหน้า Login เพื่อล็อกอินตาม Flow หลัก
                window.location.href = 'index.html';
            }
        } catch (err) {
            console.error("System Error:", err);
            alert("เกิดข้อผิดพลาดไม่คาดคิด กรุณาลองใหม่อีกครั้ง");
            btnSubmit.disabled = false;
            btnSubmit.textContent = "บันทึกรหัสผ่าน";
        }
    }
</script>
</body>
</html>
