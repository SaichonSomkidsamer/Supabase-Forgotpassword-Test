<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - OMS Admin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5c5cff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background: #4b4bdf; }
        .back-link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>ลืมรหัสผ่าน</h2>
    <p>กรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>
    <input type="email" id="forgotEmail" placeholder="admin@domain.com" required>
    <button onclick="requestPasswordReset()">ส่งลิงก์กู้คืนรหัสผ่าน</button>
    <div class="back-link">
        <a href="index.html">กลับไปหน้าล็อกอิน</a>
    </div>
</div>

<script>
    // ใช้ supabaseClient จาก config.js ที่โหลดไว้ด้านบน
    window.requestPasswordReset = async function() {
      const email = document.getElementById('forgotEmail').value.trim();
      const client = window.supabaseClient;

      if (!email) {
          alert('กรุณากรอกอีเมล');
          return;
      }

      const btn = document.querySelector('button');
      btn.innerText = "กำลังตรวจสอบ...";
      btn.disabled = true;

      try {
          // 1. เช็กก่อนว่ามีอีเมลนี้ในตาราง admin_users ของเราไหม
          const { data: userRecord, error: dbError } = await client
              .from('admin_users') // ระบุชื่อตารางที่คุณเก็บอีเมลแอดมิน
              .select('email')
              .eq('email', email)
              .single();

          // 2. ถ้าไม่พบอีเมลในตาราง หรือมี Error ให้แจ้งทันที
          if (dbError || !userRecord) {
              alert('ไม่พบอีเมลนี้ในระบบแอดมิน');
              btn.innerText = "ส่งลิงก์กู้คืนรหัสผ่าน";
              btn.disabled = false;
              return; // จบการทำงาน ไม่ต้องไปเรียกฟังก์ชันส่งเมล
          }

          // 3. ถ้าพบอีเมลค่อยสั่งให้ Supabase ส่งลิงก์
          const { error: resetError } = await client.auth.resetPasswordForEmail(email, {
              redirectTo: 'https://saichonsomkidsamer.github.io/Supabase-Forgotpassword-Test/update-password.html',
          });

          if (resetError) {
              alert('เกิดข้อผิดพลาดในการส่งอีเมล: ' + resetError.message);
          } else {
              alert('ส่งลิงก์สำเร็จ! โปรดตรวจสอบอีเมลของคุณ');
          }
      } catch (err) {
          alert('ระบบขัดข้อง: ' + err.message);
      } finally {
          btn.innerText = "ส่งลิงก์กู้คืนรหัสผ่าน";
          btn.disabled = false;
      }
  };
</script>
</body>
</html>
